<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevDigest AI Marketplace</title>
    <meta
      name="description"
      content="Catalog of Claude Code plugins, skills, and agents from the DevDigest team harness."
    />
    <script>
      // Apply the theme before first paint to avoid a flash of the wrong theme.
      try {
        var stored = localStorage.getItem('ddm-theme');
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
